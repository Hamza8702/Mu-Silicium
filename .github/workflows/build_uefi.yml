      - name: Build UEFI for lime device
        run: |
          # Step 1: Force initialize and update all git submodules recursively
          # This prevents "File Not Found" errors during the ACPI and Openssl stages.
          git submodule update --init --recursive
          
          # Step 2: Set up the build environment using the apt provider
          # This installs all necessary compilers (GCC/Clang) and build tools.
          bash ./setup_env.sh -p apt
          
          # Step 3: Execute the UEFI build process for the Xiaomi 'lime' platform
          # This triggers the Stuart (Project Mu) build engine.
          bash ./build_uefi.sh -d lime
        env:
          # Ensure the environment knows it's a CI build to avoid interactive prompts
          CI_BUILD: true
